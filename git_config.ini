# Git 自动化配置文件
# 修改此文件后，运行 ./git_setup.sh 或 python3 git_sync.py

[git]
# Git 用户信息
user_name = apuonline
user_email = lx0321096038@163.com

# 主分支名称
main_branch = main

[github]
# GitHub 仓库配置
github_username = apuomline
repository_name = The-Academic-Daily

# 连接方式: https 或 ssh
connection = https

# 完整的远程仓库 URL（留空则自动生成）
# HTTPS: https://github.com/username/repo.git
# SSH: git@github.com:username/repo.git
remote_url = https://github.com/apuomline/The-Academic-Daily.git

[options]
# 是否跳过 git hooks
skip_hooks = false

# 是否使用详细输出
verbose = true
